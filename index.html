<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iTrack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy: #0F1B35;
      --navy-mid: #162040;
      --navy-light: #1E2D52;
      --teal: #00BFA6;
      --teal-dim: #00897B;
      --gold: #FFB300;
      --red: #EF4444;
      --green: #22C55E;
      --blue: #3B82F6;
      --slate: #64748B;
      --text: #E2E8F0;
      --text-dim: #94A3B8;
      --border: rgba(255,255,255,0.08);
      --card: rgba(255,255,255,0.04);
      --card-hover: rgba(255,255,255,0.07);
      --radius: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Sarabun', sans-serif;
      background: var(--navy);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }
    .sidebar {
      position: fixed; left: 0; top: 0; bottom: 0; width: 240px;
      background: var(--navy-mid);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      z-index: 100;
    }
    .logo { padding: 24px 20px 20px; border-bottom: 1px solid var(--border); }
    .logo-mark {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 20px; font-weight: 500; color: var(--teal); letter-spacing: -1px;
    }
    .logo-sub { font-size: 11px; color: var(--text-dim); margin-top: 2px; letter-spacing: 2px; text-transform: uppercase; }
    nav { flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 4px; }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 8px;
      cursor: pointer; transition: all 0.15s;
      color: var(--text-dim); font-size: 14px;
      border: none; background: none; width: 100%; text-align: left;
    }
    .nav-item:hover { background: var(--card-hover); color: var(--text); }
    .nav-item.active { background: rgba(0,191,166,0.12); color: var(--teal); }
    .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
    .nav-section { font-size: 10px; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase; padding: 12px 12px 4px; margin-top: 8px; }
    .sidebar-footer { padding: 16px; border-top: 1px solid var(--border); }
    .user-info { display: flex; align-items: center; gap: 10px; }
    .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--teal-dim); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: white; flex-shrink: 0; }
    .user-name { font-size: 13px; font-weight: 500; }
    .user-role { font-size: 11px; color: var(--text-dim); }
    .main { margin-left: 240px; min-height: 100vh; }
    .topbar {
      position: sticky; top: 0; z-index: 50;
      background: rgba(15,27,53,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 14px 28px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .page-title { font-size: 18px; font-weight: 600; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 500;
      cursor: pointer; border: none; transition: all 0.15s; font-family: 'Sarabun', sans-serif;
    }
    .btn-primary { background: var(--teal); color: var(--navy); }
    .btn-primary:hover { background: #00D4B8; }
    .btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--card-hover); }
    .btn-danger { background: rgba(239,68,68,0.12); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
    .btn-danger:hover { background: rgba(239,68,68,0.2); }
    .btn svg { width: 16px; height: 16px; }
    .content { padding: 28px; }
    #loginScreen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(0,191,166,0.08) 0%, transparent 70%);
    }
    .login-card {
      background: var(--navy-mid); border: 1px solid var(--border);
      border-radius: 20px; padding: 48px;
      max-width: 400px; width: 100%; text-align: center;
    }
    .login-icon { font-size: 48px; margin-bottom: 16px; }
    .login-title { font-size: 28px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .login-sub { font-size: 14px; color: var(--text-dim); margin-bottom: 32px; line-height: 1.6; }
    .ms-btn {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      width: 100%; padding: 14px; border-radius: 10px;
      background: #2F72C4; color: white;
      border: none; cursor: pointer; font-size: 15px; font-weight: 500;
      font-family: 'Sarabun', sans-serif; transition: background 0.15s;
    }
    .ms-btn:hover { background: #2563B0; }
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 28px; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
    .stat-label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .stat-value { font-size: 32px; font-weight: 700; line-height: 1; }
    .stat-sub { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
    .stat-card.teal .stat-value { color: var(--teal); }
    .stat-card.gold .stat-value { color: var(--gold); }
    .stat-card.red .stat-value { color: var(--red); }
    .stat-card.blue .stat-value { color: var(--blue); }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .section-title { font-size: 16px; font-weight: 600; }
    .project-table { width: 100%; border-collapse: collapse; }
    .project-table th {
      text-align: left; font-size: 11px; font-weight: 600;
      color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px;
      padding: 10px 16px; border-bottom: 1px solid var(--border);
    }
    .project-table td { padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 14px; }
    .project-table tr:hover td { background: var(--card-hover); }
    .project-table tr:last-child td { border-bottom: none; }
    .table-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 500;
    }
    .badge-dot { width: 6px; height: 6px; border-radius: 50%; }
    .badge.on-track { background: rgba(34,197,94,0.12); color: var(--green); }
    .badge.on-track .badge-dot { background: var(--green); }
    .badge.at-risk { background: rgba(255,179,0,0.12); color: var(--gold); }
    .badge.at-risk .badge-dot { background: var(--gold); }
    .badge.delayed { background: rgba(239,68,68,0.12); color: var(--red); }
    .badge.delayed .badge-dot { background: var(--red); }
    .badge.completed { background: rgba(59,130,246,0.12); color: var(--blue); }
    .badge.completed .badge-dot { background: var(--blue); }
    .badge.planning { background: rgba(100,116,139,0.2); color: var(--text-dim); }
    .badge.planning .badge-dot { background: var(--slate); }
    .progress-wrap { display: flex; align-items: center; gap: 10px; }
    .progress-bar { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 3px; background: var(--teal); transition: width 0.3s; }
    .progress-fill.gold { background: var(--gold); }
    .progress-fill.red { background: var(--red); }
    .progress-pct { font-size: 12px; color: var(--text-dim); min-width: 32px; text-align: right; font-family: 'IBM Plex Mono', monospace; }
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px); z-index: 200;
      display: flex; align-items: center; justify-content: center; padding: 24px;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--navy-mid); border: 1px solid var(--border);
      border-radius: 16px; width: 100%; max-width: 680px; max-height: 90vh;
      overflow-y: auto; transform: translateY(16px); transition: transform 0.2s;
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 24px 28px 0; }
    .modal-title { font-size: 18px; font-weight: 600; }
    .modal-close { background: none; border: none; cursor: pointer; color: var(--text-dim); padding: 4px; }
    .modal-close:hover { color: var(--text); }
    .modal-body { padding: 24px 28px; display: flex; flex-direction: column; gap: 18px; }
    .modal-footer { padding: 0 28px 24px; display: flex; gap: 10px; justify-content: flex-end; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: 12px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
    input, select, textarea {
      background: rgba(255,255,255,0.05); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 12px;
      color: var(--text); font-size: 14px; font-family: 'Sarabun', sans-serif;
      transition: border-color 0.15s; outline: none;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--teal); }
    select option { background: var(--navy-mid); }
    textarea { resize: vertical; min-height: 80px; }
    .tabs { display: flex; gap: 2px; background: var(--card); border-radius: 8px; padding: 3px; margin-bottom: 24px; width: fit-content; }
    .tab {
      padding: 7px 16px; border-radius: 6px; font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all 0.15s; color: var(--text-dim);
      border: none; background: none; font-family: 'Sarabun', sans-serif;
    }
    .tab.active { background: var(--navy-light); color: var(--text); }
    .report-options { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .report-card {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 20px; cursor: pointer; transition: all 0.15s; text-align: left;
    }
    .report-card:hover { border-color: var(--teal); background: rgba(0,191,166,0.05); }
    .report-card.selected { border-color: var(--teal); background: rgba(0,191,166,0.08); }
    .report-icon { font-size: 28px; margin-bottom: 10px; }
    .report-name { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .report-desc { font-size: 12px; color: var(--text-dim); line-height: 1.5; }
    .detail-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 24px; gap: 16px; }
    .detail-title { font-size: 22px; font-weight: 700; }
    .detail-code { font-size: 13px; color: var(--text-dim); font-family: 'IBM Plex Mono', monospace; margin-top: 4px; }
    .detail-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .detail-item { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
    .detail-item-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
    .detail-item-value { font-size: 15px; font-weight: 600; }
    .milestone-list { display: flex; flex-direction: column; gap: 10px; }
    .milestone-item {
      background: var(--card); border: 1px solid var(--border); border-radius: 8px;
      padding: 12px 16px; display: flex; align-items: center; gap: 12px;
    }
    .milestone-dot { width: 12px; height: 12px; border-radius: 50%; background: var(--teal); flex-shrink: 0; }
    .milestone-dot.done { background: var(--green); }
    .milestone-dot.late { background: var(--red); }
    .milestone-name { flex: 1; font-size: 14px; }
    .milestone-date { font-size: 12px; color: var(--text-dim); font-family: 'IBM Plex Mono', monospace; }
    .empty { text-align: center; padding: 64px 24px; color: var(--text-dim); }
    .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
    .empty-text { font-size: 15px; }
    #toast {
      position: fixed; bottom: 24px; right: 24px; z-index: 999;
      background: var(--navy-light); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 18px;
      font-size: 14px; display: flex; align-items: center; gap: 10px;
      transform: translateY(80px); opacity: 0; transition: all 0.3s;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.success { border-color: rgba(34,197,94,0.4); }
    #toast.error { border-color: rgba(239,68,68,0.4); }
    .spinner {
      width: 20px; height: 20px; border: 2px solid var(--border);
      border-top-color: var(--teal); border-radius: 50%;
      animation: spin 0.7s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none !important; }
    .text-right { text-align: right; }
    .flex { display: flex; }
    .gap-2 { gap: 8px; }
    .items-center { align-items: center; }
  </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-icon">📊</div>
    <div class="login-title">iTrack</div>
    <div class="login-sub">ระบบบริหารจัดการโครงการ<br/>เชื่อมต่อกับ Microsoft 365 ของบริษัท</div>
    <button class="ms-btn" onclick="signIn()">
      <svg width="20" height="20" viewBox="0 0 23 23" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="1" width="10" height="10" fill="#f25022"/>
        <rect x="12" y="1" width="10" height="10" fill="#7fba00"/>
        <rect x="1" y="12" width="10" height="10" fill="#00a4ef"/>
        <rect x="12" y="12" width="10" height="10" fill="#ffb900"/>
      </svg>
      เข้าสู่ระบบด้วย Microsoft 365
    </button>
    <p style="font-size:12px;color:var(--text-dim);margin-top:16px;">ข้อมูลเก็บใน SharePoint ของบริษัท</p>
  </div>
</div>

<!-- APP SHELL -->
<div id="appShell" class="hidden">
  <div class="sidebar">
    <div class="logo">
      <div class="logo-mark">PM//</div>
      <div class="logo-sub">Dashboard</div>
    </div>
    <nav>
      <div class="nav-section">หน้าหลัก</div>
      <button class="nav-item active" onclick="showPage('dashboard')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        ภาพรวม
      </button>
      <button class="nav-item" onclick="showPage('projects')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3h18v4H3zm0 7h18v4H3zm0 7h18v4H3z"/></svg>
        โครงการทั้งหมด
      </button>
      <div class="nav-section">จัดการ</div>
      <button class="nav-item" onclick="openAddProject()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        เพิ่มโครงการ
      </button>
      <button class="nav-item" onclick="showPage('report')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        สร้างรายงาน/สไลด์
      </button>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="avatar" id="userAvatar">?</div>
        <div>
          <div class="user-name" id="userName">กำลังโหลด...</div>
          <div class="user-role">Project Manager</div>
        </div>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <div class="page-title" id="pageTitle">ภาพรวม</div>
      <div class="flex gap-2 items-center">
        <button class="btn btn-secondary" onclick="syncData()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
          ซิงค์
        </button>
        <button class="btn btn-secondary" onclick="signOut()">ออกจากระบบ</button>
      </div>
    </div>
    <div class="content" id="pageContent"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="projectModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">เพิ่มโครงการใหม่</div>
      <button class="modal-close" onclick="closeModal()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label>รหัสโครงการ</label><input type="text" id="f_code" placeholder="PRJ-001"/></div>
        <div class="form-group"><label>ชื่อโครงการ</label><input type="text" id="f_name" placeholder="ชื่อโครงการ"/></div>
      </div>
      <div class="form-group"><label>รายละเอียดโครงการ</label><textarea id="f_desc" placeholder="อธิบายโครงการ วัตถุประสงค์ ขอบเขต..."></textarea></div>
      <div class="form-row">
        <div class="form-group"><label>PM รับผิดชอบ</label><input type="text" id="f_pm" placeholder="ชื่อ PM"/></div>
        <div class="form-group"><label>ลูกค้า / ผู้ว่าจ้าง</label><input type="text" id="f_client" placeholder="ชื่อลูกค้า"/></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>วันเริ่มต้น</label><input type="date" id="f_start"/></div>
        <div class="form-group"><label>วันสิ้นสุด</label><input type="date" id="f_end"/></div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>สถานะ</label>
          <select id="f_status">
            <option value="planning">Planning</option>
            <option value="on-track">On Track</option>
            <option value="at-risk">At Risk</option>
            <option value="delayed">Delayed</option>
            <option value="completed">Completed</option>
          </select>
        </div>
        <div class="form-group"><label>ความคืบหน้า (%)</label><input type="number" id="f_progress" placeholder="0-100" min="0" max="100"/></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>งบประมาณ (บาท)</label><input type="number" id="f_budget" placeholder="0"/></div>
        <div class="form-group"><label>งบที่ใช้ไปแล้ว (บาท)</label><input type="number" id="f_spent" placeholder="0"/></div>
      </div>
      <div class="form-group"><label>ความเสี่ยงปัจจุบัน</label><textarea id="f_risks" placeholder="ระบุความเสี่ยงหรือปัญหาที่พบ..." style="min-height:60px;"></textarea></div>
      <div class="form-group"><label>Milestones (คั่นด้วย ;)</label><input type="text" id="f_milestones" placeholder="Kick-off 2024-01-15; UAT 2024-03-01"/></div>
      <div class="form-group"><label>Update ล่าสุด / หมายเหตุ</label><textarea id="f_notes" placeholder="สรุปความคืบหน้า งานที่ทำเสร็จ งานถัดไป..." style="min-height:60px;"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">ยกเลิก</button>
      <button class="btn btn-primary" onclick="saveProject()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        บันทึก
      </button>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- โหลด scripts ที่ท้าย body เพื่อให้แน่ใจว่า DOM พร้อมก่อน -->
