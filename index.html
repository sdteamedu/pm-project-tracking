<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iWise Red Theme</title>

  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --primary: #CC1E2B;
      --primary-hover: #A8161F;
      --primary-light: #FEE2E2;

      --background: #F8F9FA;
      --card: #FFFFFF;
      --border: #E5E7EB;

      --text: #1F2937;
      --text-dim: #6B7280;

      --success: #16A34A;
      --warning: #F59E0B;
      --danger: #DC2626;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Sarabun', sans-serif;
      background: var(--background);
      color: var(--text);
    }

    /* Sidebar */
    .sidebar {
      position: fixed;
      width: 240px;
      top: 0;
      bottom: 0;
      background: var(--card);
      border-right: 1px solid var(--border);
      padding: 20px;
    }

    .logo {
      font-size: 20px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 30px;
    }

    .nav-item {
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 6px;
      cursor: pointer;
      color: var(--text-dim);
      transition: 0.2s;
    }

    .nav-item:hover {
      background: var(--primary-light);
      color: var(--primary);
    }

    .nav-item.active {
      background: var(--primary-light);
      color: var(--primary);
      font-weight: 600;
    }

    /* Main */
    .main {
      margin-left: 240px;
    }

    .topbar {
      background: var(--card);
      padding: 16px 28px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .content {
      padding: 32px;
    }

    /* Buttons */
    .btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-family: 'Sarabun';
      transition: 0.2s;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
    }

    .btn-secondary {
      background: #F3F4F6;
      border: 1px solid var(--border);
    }

    /* Cards */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      transition: 0.2s;
    }

    .card:hover {
      transform: translateY(-2px);
    }

    /* Table */
    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      background: #F9FAFB;
      text-align: left;
      font-size: 12px;
      padding: 10px;
      color: var(--text-dim);
    }

    td {
      padding: 12px;
      border-top: 1px solid var(--border);
    }

    tr:hover td {
      background: var(--primary-light);
    }

    /* Badge */
    .badge {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
    }

    .success { background: #DCFCE7; color: var(--success); }
    .danger { background: #FEE2E2; color: var(--danger); }

    /* Progress */
    .progress {
      height: 6px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--primary);
    }

  </style>
</head>
<body>

<div class="sidebar">
  <div class="logo">iWise</div>
  <div class="nav-item active">Dashboard</div>
  <div class="nav-item">Projects</div>
  <div class="nav-item">Financial</div>
</div>

<div class="main">
  <div class="topbar">
    <div>Dashboard</div>
    <button class="btn btn-primary">+ New Project</button>
  </div>

  <div class="content">

    <div class="card">
      <h3>Project Overview</h3>
      <table>
        <thead>
          <tr>
            <th>Project</th>
            <th>Status</th>
            <th>Progress</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>ERP Implementation</td>
            <td><span class="badge success">On Track</span></td>
            <td>
              <div class="progress">
                <div class="progress-fill" style="width:70%"></div>
              </div>
            </td>
          </tr>

          <tr>
            <td>Data Warehouse</td>
            <td><span class="badge danger">Delayed</span></td>
            <td>
              <div class="progress">
                <div class="progress-fill" style="width:40%"></div>
              </div>
            </td>
          </tr>

        </tbody>
      </table>
    </div>

  </div>
</div>

</body>
</html>
